<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Form</title>
</head>
<body>
    <h1 id="title">freeCodeCamp Survey Form</h1>
    <p id="description">Lorem ipsum dolor sit amet consectetur adipisicing elit. Ut, quod!</p>
    <form action="" method="post" id="survey-form">
        <label for="name" id="name-label">Name:</label>
        <input 
        type="text" 
        name="name" 
        id="name"
        placeholder="Enter your name"
        required>
<br>
        <label for="email" id="email-label">Email:</label>
        <input 
        type="email" 
        name="email" 
        id="email"
        size="email"
        placeholder="Enter your email"
        required>
<br>
        <label for="number" id="number-label">Age (optional):</label>
        <input 
        type="number" 
        name="number" 
        id="number"
        min="3"
        max="100"
        placeholder="Enter your age">
<br>
        <p>Which option best describes your current role?</p>
        <select name="role" id="dropdown" placeholder>
            <option value="" disabled selected >Choose a Role</option>
            <option value="student">Student</option>
            <option value="full-time-job">Full Time Job</option>
            <option value="full-time-learner">Full Time Learner</option>
            <option value="prefer-not-to-say">Prefer not to say</option>
            <option value="others">Others</option>
        </select>
<br>
        <p>Would you recommend freeCodeCamp to a friend?</p>
        <input type="radio" name="recommend" id="definitely" value="definitely">
        <label for="definitely">Definitely</label>

        <input type="radio" name="recommend" id="maybe" value="maybe">
        <label for="maybe">Maybe</label>

        <input type="radio" name="recommend" id="not-sure" value="not-sure">
        <label for="not-sure">Not Sure</label>
<br>
        <p>What would you like to see improved? (Check all that apply)</p>
        <input type="checkbox" name="choice" id="front-end" value="front-end">
        <label for="front-end">Front-End Projects</label>

        <input type="checkbox" name="choice" id="back-end" value="back-end">
        <label for="back-end">Back-End Projects</label>

        <input type="checkbox" name="choice" id="data-visualization" value="data-visualization">
        <label for="data-visualization">Data Visualization</label>
        <br>
        <br>
        <label for="comments">Any comments or suggestions?</label>
        <br>
        <textarea name="comments" id="comments" cols="30" rows="10"></textarea>
        <br>
        <button type="submit" id="submit">Submit</button>
    </form>
</body>
</html>
